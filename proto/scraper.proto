syntax = "proto3";

package scraper;

service ScraperService {
  // Scrape a URL (or crawl up to max_pages starting from it)
  rpc Scrape (ScrapeRequest) returns (ScrapeResponse);

  // Stream results page-by-page as they are scraped
  rpc ScrapeStream (ScrapeRequest) returns (stream PageResult);
}

message ScrapeRequest {
  string url       = 1; // Start URL
  int32  max_pages = 2; // Max pages to crawl (default 5)
  bool   force_js  = 3; // Force Playwright JS rendering
  string output_csv = 4; // Optional: save to this CSV path on server
}

message PageResult {
  string url        = 1;
  string title      = 2;
  repeated string headings   = 3;
  repeated string paragraphs = 4;
  repeated string links      = 5;
}

message ScrapeResponse {
  repeated PageResult pages  = 1;
  int32  total_pages         = 2;
  string csv_path            = 3; // Populated when output_csv was set
  string error               = 4; // Non-empty on failure
}
